<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ Code Battle · JS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap');

    :root {
      --c:      #00e5ff;
      --m:      #ff1cf7;
      --g:      #00ff9d;
      --r:      #ff2d55;
      --y:      #ffd60a;
      --js:     #f7df1e;   /* JS yellow */
      --bg:     #03030d;
      --panel:  #07071a;
      --card:   #0c0c22;
      --border: #1a1a3e;
      --text:   #c8c8e8;
      --dim:    #5a5a8a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      display: grid;
      grid-template-rows: 52px 1fr;
      overflow: hidden;
      background-image:
        radial-gradient(ellipse at 15% 50%, rgba(0,229,255,.04) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 50%, rgba(255,28,247,.04) 0%, transparent 55%);
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      background: rgba(7,7,26,.96);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
    }

    .h-brand {
      font-family: 'Rajdhani', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--c);
      text-shadow: 0 0 12px var(--c);
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .js-badge {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 700;
      background: var(--js);
      color: #000;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 1px;
    }

    .h-div { width: 1px; height: 22px; background: var(--border); }

    .h-qtitle {
      flex: 1;
      text-align: center;
      font-size: 13px;
      color: #aaa;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .h-round {
      font-size: 10px;
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--dim);
      white-space: nowrap;
    }

    .h-scores {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
    }
    .h-sl { color: var(--c); text-shadow: 0 0 10px var(--c); }
    .h-ss { color: var(--border); font-size: 15px; }
    .h-sr { color: var(--m); text-shadow: 0 0 10px var(--m); }

    /* ── Main grid ───────────────────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 1fr 260px 1fr;
      overflow: hidden;
    }

    /* ── Player panels ───────────────────────────────────────────────────── */
    .pp {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pp.left  { border-right: 1px solid var(--border); }
    .pp.right { border-left:  1px solid var(--border); }

    .pp-head {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 8px;
    }

    .pp-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .left  .pp-name { color: var(--c); }
    .right .pp-name { color: var(--m); }

    .you-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(255,214,10,.12);
      border: 1px solid var(--y);
      color: var(--y);
    }

    .sp {
      font-size: 10px;
      padding: 2px 9px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--dim);
      background: var(--card);
      white-space: nowrap;
      transition: all .2s;
    }
    .sp.testing  { border-color: #0af;     color: #0af;     background: rgba(0,160,255,.08); }
    .sp.passed   { border-color: var(--g); color: var(--g); background: rgba(0,255,157,.08); }
    .sp.failed   { border-color: var(--r); color: var(--r); background: rgba(255,45,85,.08);  }
    .sp.error    { border-color: var(--r); color: var(--r); background: rgba(255,45,85,.08);  }

    /* ── Editor ──────────────────────────────────────────────────────────── */
    .pp-editor {
      flex: 1;
      padding: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .ln-wrap {
      flex: 1;
      display: flex;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #020209;
    }

    .ln {
      width: 34px;
      flex-shrink: 0;
      padding: 12px 4px 12px 6px;
      font-size: 12px;
      line-height: 1.6;
      color: #252545;
      text-align: right;
      background: #03030f;
      border-right: 1px solid var(--border);
      user-select: none;
      overflow: hidden;
      white-space: pre;
    }

    textarea.ta {
      flex: 1;
      background: transparent;
      color: #dde0ff;
      border: none;
      padding: 12px 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12.5px;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 4;
      overflow-wrap: normal;
      white-space: pre;
      overflow: auto;
      caret-color: var(--c);
    }
    .right textarea.ta { caret-color: var(--m); }

    textarea.ta:disabled { color: #2a2a4a; cursor: default; }

    /* Opponent lock overlay */
    .lock {
      display: none;
      position: absolute;
      inset: 8px;
      background: rgba(3,3,13,.88);
      backdrop-filter: blur(3px);
      border: 1px solid var(--border);
      border-radius: 4px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      z-index: 5;
    }
    .lock.on { display: flex; }
    .lock-icon { font-size: 28px; opacity: .25; }
    .lock-txt  { font-size: 10px; color: var(--dim); text-align: center; line-height: 1.5; }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    .pp-foot {
      padding: 8px 8px 10px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .run-btn {
      width: 100%;
      padding: 9px;
      background: transparent;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 4px;
      transition: background .14s, color .14s, box-shadow .14s;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }
    .left  .run-btn { border: 1px solid var(--c); color: var(--c); }
    .right .run-btn { border: 1px solid var(--m); color: var(--m); }
    .left  .run-btn:hover:not(:disabled) { background: var(--c); color: #000; box-shadow: 0 0 20px rgba(0,229,255,.4); }
    .right .run-btn:hover:not(:disabled) { background: var(--m); color: #000; box-shadow: 0 0 20px rgba(255,28,247,.4); }
    .run-btn:disabled { opacity: .25; cursor: not-allowed; }
    .run-btn .rl { display: inline; }
    .run-btn .rs { display: none; animation: spin 1s linear infinite; }
    .run-btn.running .rl { display: none; }
    .run-btn.running .rs { display: inline; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Test dots */
    .tdots {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      min-height: 14px;
    }
    .dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--border);
      transition: background .2s, box-shadow .2s;
      cursor: default;
      position: relative;
    }
    .dot.run  { background: var(--y); box-shadow: 0 0 7px var(--y); animation: dp .7s ease-in-out infinite; }
    .dot.pass { background: var(--g); box-shadow: 0 0 7px var(--g); }
    .dot.fail { background: var(--r); box-shadow: 0 0 7px var(--r); }
    @keyframes dp { 0%,100% { opacity:1; } 50% { opacity:.35; } }

    .err {
      font-size: 10px;
      color: var(--r);
      max-height: 56px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.45;
    }

    /* ── Question panel ──────────────────────────────────────────────────── */
    .qp {
      background: var(--panel);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .q-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 5px;
    }
    .q-diff {
      display: inline-block;
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 13px;
      letter-spacing: 1px;
    }
    .q-diff.Easy   { background: rgba(0,255,157,.1);  border: 1px solid var(--g); color: var(--g); }
    .q-diff.Medium { background: rgba(255,214,10,.1); border: 1px solid var(--y); color: var(--y); }
    .q-diff.Hard   { background: rgba(255,45,85,.1);  border: 1px solid var(--r); color: var(--r); }

    .q-desc {
      font-size: 11.5px;
      color: #8888aa;
      line-height: 1.75;
      white-space: pre-wrap;
      margin-bottom: 14px;
    }
    .q-ex-hdr {
      font-size: 9px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }
    .q-ex {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 9px 11px;
      margin-bottom: 8px;
      font-size: 11px;
    }
    .q-ex-io { color: #aac0ff; line-height: 1.9; }
    .q-ex-io span { color: #44446a; }
    .q-ex-note { color: var(--dim); font-size: 10px; margin-top: 4px; }

    .q-tccount {
      font-size: 10px;
      color: var(--dim);
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    /* ── Overlay ─────────────────────────────────────────────────────────── */
    #ov {
      position: fixed; inset: 0;
      background: rgba(3,3,13,.92);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      gap: 14px;
      transition: opacity .25s;
    }
    #ov.gone { display: none; }

    .ov-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 46px;
      font-weight: 700;
      letter-spacing: 4px;
      text-shadow: 0 0 40px currentColor;
      text-align: center;
    }
    .ov-sub {
      font-size: 13px;
      color: var(--dim);
      text-align: center;
      max-width: 360px;
      line-height: 1.6;
    }
    .ov-cd {
      font-family: 'Rajdhani', sans-serif;
      font-size: 130px;
      font-weight: 700;
      color: var(--c);
      text-shadow: 0 0 80px var(--c);
      line-height: 1;
      animation: cdIn .9s cubic-bezier(.17,.67,.3,1.2);
    }
    @keyframes cdIn { from { transform: scale(1.5); opacity:0; } to { transform:scale(1); opacity:1; } }
    .ov-go {
      font-family: 'Rajdhani', sans-serif;
      font-size: 90px;
      font-weight: 700;
      color: var(--g);
      text-shadow: 0 0 60px var(--g);
      animation: goIn .35s ease-out;
    }
    @keyframes goIn { from { transform:scale(.5); opacity:0; } to { transform:scale(1); opacity:1; } }

    .ov-badge {
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      padding: 6px 20px;
      border-radius: 20px;
      letter-spacing: 2px;
    }
    .ov-badge.left  { background: rgba(0,229,255,.1);  border: 1px solid var(--c); color: var(--c); }
    .ov-badge.right { background: rgba(255,28,247,.1); border: 1px solid var(--m); color: var(--m); }

    .ov-score { font-size: 12px; color: var(--dim); }
    .ov-score b { color: var(--text); }

    .ov-time { font-size: 11px; color: var(--dim); }
    .ov-time b { color: var(--g); }

    .ov-btn {
      padding: 11px 34px;
      background: transparent;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      transition: all .15s;
      margin-top: 4px;
    }
    .ov-btn.c { border: 1px solid var(--c); color: var(--c); }
    .ov-btn.c:hover { background: var(--c); color: #000; box-shadow: 0 0 24px rgba(0,229,255,.5); }
    .ov-btn.g { border: 1px solid var(--g); color: var(--g); }
    .ov-btn.g:hover { background: var(--g); color: #000; box-shadow: 0 0 24px rgba(0,255,157,.5); }
    .ov-btn.y { border: 1px solid var(--y); color: var(--y); }
    .ov-btn.y:hover { background: var(--y); color: #000; }

    .ov-share {
      font-size: 11px;
      color: var(--dim);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      text-align: center;
      max-width: 380px;
      line-height: 1.6;
    }
    .ov-share .url {
      display: block;
      color: #4af;
      font-size: 10.5px;
      word-break: break-all;
      margin: 6px 0 4px;
    }
    .copy-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 3px 10px;
      background: transparent;
      border: 1px solid #333;
      color: #666;
      cursor: pointer;
      border-radius: 3px;
      transition: all .1s;
    }
    .copy-btn:hover { border-color: var(--c); color: var(--c); }

    .ov-match {
      font-family: 'Rajdhani', sans-serif;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 2px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="h-brand">⚡ CODE BATTLE</div>
    <div class="js-badge">JS</div>
    <div class="h-div"></div>
    <div class="h-qtitle" id="hQ">–</div>
    <div class="h-round" id="hR">ROUND 1 / 2</div>
    <div class="h-scores">
      <span class="h-sl" id="hSL">0</span>
      <span class="h-ss">:</span>
      <span class="h-sr" id="hSR">0</span>
    </div>
  </header>

  <main>
    <!-- LEFT -->
    <div class="pp left" id="ppL">
      <div class="pp-head">
        <div class="pp-name">◀ PLAYER 1<span class="you-tag" id="ytL" style="display:none">YOU</span></div>
        <div class="sp" id="spL">READY</div>
      </div>
      <div class="pp-editor">
        <div class="lock" id="lkL">
          <div class="lock-icon">🔒</div>
          <div class="lock-txt">Opponent's code<br>is hidden</div>
        </div>
        <div class="ln-wrap">
          <div class="ln" id="lnL">1</div>
          <textarea class="ta" id="taL" spellcheck="false" autocomplete="off" autocorrect="off"></textarea>
        </div>
      </div>
      <div class="pp-foot">
        <button class="run-btn" id="bnL" disabled onclick="submit('left')">
          <span class="rl">▶ RUN</span><span class="rs">↻</span>
        </button>
        <div class="tdots" id="tdL"></div>
        <div class="err"   id="erL"></div>
      </div>
    </div>

    <!-- QUESTION -->
    <div class="qp">
      <div class="q-title" id="qTitle">–</div>
      <div class="q-diff"  id="qDiff">–</div>
      <div class="q-desc"  id="qDesc">–</div>
      <div id="qExs"></div>
      <div class="q-tccount" id="qTc"></div>
    </div>

    <!-- RIGHT -->
    <div class="pp right" id="ppR">
      <div class="pp-head">
        <div class="pp-name">PLAYER 2 ▶<span class="you-tag" id="ytR" style="display:none">YOU</span></div>
        <div class="sp" id="spR">READY</div>
      </div>
      <div class="pp-editor">
        <div class="lock" id="lkR">
          <div class="lock-icon">🔒</div>
          <div class="lock-txt">Opponent's code<br>is hidden</div>
        </div>
        <div class="ln-wrap">
          <div class="ln" id="lnR">1</div>
          <textarea class="ta" id="taR" spellcheck="false" autocomplete="off" autocorrect="off"></textarea>
        </div>
      </div>
      <div class="pp-foot">
        <button class="run-btn" id="bnR" disabled onclick="submit('right')">
          <span class="rl">▶ RUN</span><span class="rs">↻</span>
        </button>
        <div class="tdots" id="tdR"></div>
        <div class="err"   id="erR"></div>
      </div>
    </div>
  </main>

  <!-- OVERLAY -->
  <div id="ov">
    <div class="ov-title" id="ovT" style="color:var(--c)">⚡ CODE BATTLE</div>
    <div class="ov-sub"   id="ovS"></div>
    <div id="ovX"></div>
    <button class="ov-btn c" id="ovB" style="display:none"></button>
  </div>

  <script src="game.js"></script>
</body>
</html>
